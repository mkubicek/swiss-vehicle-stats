name: Monthly Update

on:
  schedule:
    # 5th of each month at 08:00 UTC (09:00 CET / 10:00 CEST)
    - cron: '0 8 5 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen
        env:
          UV_SYSTEM_PYTHON: "1"

      - name: Download data
        run: uv run scripts/download.py

      - name: Process data
        run: uv run scripts/process.py

      - name: Validate data
        run: uv run scripts/validate.py

      - name: Generate charts
        run: uv run scripts/chart.py

      - name: Generate report
        run: uv run scripts/report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ charts/ reports/ warnings.log
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "data: update $(date +%Y-%m)"
          git push
