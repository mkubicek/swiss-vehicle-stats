name: Update

on:
  schedule:
    # 5th, 15th, 25th of each month at 08:00 UTC
    - cron: '0 8 5,15,25 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen
        env:
          UV_SYSTEM_PYTHON: "1"

      - name: Restore raw vehicle data (compressed)
        id: raw-cache
        uses: actions/cache/restore@v4
        with:
          path: data/raw.tar.zst
          key: raw-data-v3-${{ hashFiles('scripts/download.py') }}-${{ runner.os }}
          restore-keys: |
            raw-data-v3-

      - name: Extract cached raw data
        if: hashFiles('data/raw.tar.zst') != ''
        run: |
          mkdir -p data/raw
          tar --zstd -xf data/raw.tar.zst -C data/
          rm -f data/raw.tar.zst
          echo "Cached files:" && ls -lh data/raw/

      - name: Download data (with per-file invalidation)
        run: uv run scripts/download.py
        env:
          DOWNLOAD_TIMEOUT: "900"

      - name: Re-pack raw data for next cache
        if: always()
        run: |
          if [ -d data/raw ] && ls data/raw/*.txt >/dev/null 2>&1; then
            tar --zstd -cf data/raw.tar.zst -C data raw/
          fi

      - name: Save updated raw vehicle data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/raw.tar.zst
          key: raw-data-v3-${{ hashFiles('scripts/download.py') }}-${{ github.run_id }}

      - name: Process data
        run: uv run scripts/process.py

      - name: Validate data
        run: uv run scripts/validate.py

      - name: Generate projection
        run: uv run scripts/project.py

      - name: Generate charts
        run: |
          DAY=$(date -u +%d)
          if [ "$DAY" = "05" ]; then
            uv run scripts/chart.py
          else
            uv run scripts/chart.py --skip-gifs
          fi

      - name: Generate report
        run: uv run scripts/report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ charts/ reports/ warnings.log
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "data: update $(date +%Y-%m)"
          git push
