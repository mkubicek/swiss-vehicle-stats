name: Cache Keepalive

on:
  schedule:
    # Every Monday at 06:00 UTC — keeps the raw data cache alive (7-day eviction)
    - cron: '0 6 * * 1'

permissions:
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: data/raw.tar.zst
          key: raw-data-v3-${{ hashFiles('scripts/download.py') }}-${{ runner.os }}
          restore-keys: |
            raw-data-v3-

      - name: Re-save cache to reset TTL
        if: hashFiles('data/raw.tar.zst') != ''
        uses: actions/cache/save@v4
        with:
          path: data/raw.tar.zst
          key: raw-data-v3-keepalive-${{ github.run_id }}
